services:
  scriberr:
    image: ghcr.io/rishikanthc/scriberr:latest
    ports:
      - "8080:8080"
    volumes:
      - scriberr_data:/app/data
      - model_data:/app/data/models
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      # Security: already set in container, but can be overridden
      - APP_ENV=production
      - SPEECH_ENGINE_PROVIDER=cpu
      - SPEECH_ENGINE_CACHE_DIR=/app/data/models
      - SPEECH_ENGINE_AUTO_DOWNLOAD=true
      - TRANSCRIPTION_WORKERS=1
      # CORS: comma-separated list of allowed origins for production
      # - ALLOWED_ORIGINS=https://your-domain.com
    restart: unless-stopped

volumes:
  scriberr_data: {}
  model_data: {}
